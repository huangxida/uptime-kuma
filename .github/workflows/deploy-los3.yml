name: Build & Deploy uptime-kuma to los3

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-uptime-kuma-los3
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  HOST: los3
  IMAGE: xidahuang/uptime-kuma
  GHCR_IMAGE: ghcr.io/huangxida/uptime-kuma
  REMOTE_COMPOSE_DIR: /root/uptime-kuma
  IMAGE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        shell: bash
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build web assets
        shell: bash
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "1"
        run: |
          npm ci
          npm run build

      - name: Build and push Docker image
        shell: bash
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f docker/dockerfile \
            --target release \
            -t "$GHCR_IMAGE:latest" \
            -t "$GHCR_IMAGE:${IMAGE_VERSION}" \
            --push \
            .

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_prod
          cat > ~/.ssh/deploy_prod <<'KEY'
          ${{ secrets.DEPLOY_SSH_KEY }}
          KEY
          chmod 600 ~/.ssh/deploy_prod
          cat > ~/.ssh/config <<'SSHCONF'
          Host los3
              HostName 47.88.27.81
              Port 46222
              User root
              IdentityFile ~/.ssh/deploy_prod
              IdentitiesOnly yes
              ServerAliveInterval 60
              StrictHostKeyChecking accept-new
              UserKnownHostsFile ~/.ssh/known_hosts
              ConnectTimeout 10
          SSHCONF
          chmod 600 ~/.ssh/config

      - name: Transfer compose file to los3
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 "$HOST" "mkdir -p '$REMOTE_COMPOSE_DIR'"
          scp -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 deploy/los3/compose.yaml "$HOST:$REMOTE_COMPOSE_DIR/compose.yaml"

      - name: Pull and restart on los3
        shell: bash
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          ssh -o ConnectTimeout=15 "$HOST" \
            "GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' GHCR_IMAGE='$GHCR_IMAGE' IMAGE='$IMAGE' IMAGE_VERSION='$IMAGE_VERSION' REMOTE_COMPOSE_DIR='$REMOTE_COMPOSE_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$REMOTE_COMPOSE_DIR/data"
          cd "$REMOTE_COMPOSE_DIR"

          echo "[los3] logging in to GHCR..."
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          echo "[los3] pulling uptime-kuma image..."
          docker pull "$GHCR_IMAGE:$IMAGE_VERSION"
          docker tag "$GHCR_IMAGE:$IMAGE_VERSION" "$IMAGE:latest"
          docker tag "$GHCR_IMAGE:$IMAGE_VERSION" "$IMAGE:$IMAGE_VERSION"

          echo "[los3] compose up -d --no-build..."
          docker compose -f compose.yaml up -d --no-build

          echo "[los3] waiting for Uptime Kuma..."
          for attempt in $(seq 1 60); do
            status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' uptime-kuma 2>/dev/null || echo missing)"
            if [ "$status" = "healthy" ]; then
              break
            fi
            if curl -fsS http://127.0.0.1:3001 >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              echo "uptime-kuma did not become ready in time (last status: $status)"
              docker logs --tail=120 uptime-kuma || true
              exit 1
            fi
            sleep 5
          done

          curl -fsS http://127.0.0.1:3001 >/dev/null
          docker image prune -f
          docker ps --filter name=uptime-kuma --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}'
          REMOTE
